<!DOCTYPE html>
<html>
<head>
<title>Driver</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">
<div class="card">

<h3>Driver Panel</h3>

<p id="status">Idle</p>

<button onclick="accept()">Accept Ride</button>

<input id="otpInput" placeholder="Enter OTP">
<button onclick="verify()">Verify OTP</button>

<button onclick="complete()">Complete Ride</button>

<p id="pay"></p>

</div>
</div>

<script>
const SERVER="http://localhost:5000";
let last="";

setInterval(async()=>{
 const res=await fetch(`${SERVER}/driver/status`);
 const d=await res.json();

 document.getElementById("status").innerText=d.status;

 if(d.status==="requested" && last!=="requested"){
   alert("🚨 New Ride Request!");
 }

 if(d.paid){
   document.getElementById("pay").innerText="💰 Payment Received";
 }

 last=d.status;

},2000);

async function accept(){
 await fetch(`${SERVER}/driver/accept`,{method:"POST"});
 alert("Accepted");
}

async function verify(){
 const otp=document.getElementById("otpInput").value;

 const res=await fetch(`${SERVER}/verify-ride-otp`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({otp})
 });

 const d=await res.json();

 if(d.status==="success") alert("Ride Started");
 else alert("Wrong OTP");
}

async function complete(){
 await fetch(`${SERVER}/complete`,{method:"POST"});
 alert("Ride Completed");
}
</script>

</body>
</html>
