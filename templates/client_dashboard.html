<!DOCTYPE html>
<html>
<head>
    <title>TAXWE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">

    <!-- STEP 1: BOOK RIDE -->
    <div id="bookSection">
        <h2>Book Ride</h2>
        <input id="source" placeholder="Source">
        <input id="dest" placeholder="Destination">
        <button onclick="bookRide()">Book Ride</button>
        <p id="status"></p>
    </div>

    <!-- STEP 2: OTP -->
    <div id="otpSection" style="display:none;">
        <h2>Driver Accepted</h2>
        <p>Your OTP:</p>
        <h1 id="otp"></h1>
        <p>Give this OTP to driver</p>
    </div>

    <!-- STEP 3: RIDE -->
    <div id="rideSection" style="display:none;">
        <h2>Ride Status</h2>
        <p id="rideStatus">Waiting...</p>
    </div>

    <!-- STEP 4: PAYMENT -->
    <div id="paymentSection" style="display:none;">
        <h2>Payment</h2>
        <p id="fareText"></p>

        <input id="amount" placeholder="Enter amount">
        <button onclick="pay()">Pay</button>

        <p id="msg"></p>

        <!-- NEW BUTTON -->
        <button id="newRideBtn" onclick="resetApp()" style="display:none;">
            Book Another Ride 🚕
        </button>
    </div>

</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
var socket = io("http://127.0.0.1:5000");

/* 🚕 BOOK RIDE */
function bookRide(){
    let source = document.getElementById("source").value;
    let dest = document.getElementById("dest").value;

    socket.emit("book_ride", {source, dest});

    document.getElementById("status").innerText = "Searching for driver...";
}

/* ✅ DRIVER ACCEPTED */
socket.on("ride_accepted", data => {
    document.getElementById("bookSection").style.display = "none";
    document.getElementById("otpSection").style.display = "block";

    document.getElementById("otp").innerText = data.otp;
});

/* 🔐 OTP VERIFIED */
socket.on("otp_success", () => {
    document.getElementById("otpSection").style.display = "none";
    document.getElementById("rideSection").style.display = "block";

    document.getElementById("rideStatus").innerText = "Ride Started 🚕";
});

/* 🏁 RIDE COMPLETED */
socket.on("ride_completed", data => {
    document.getElementById("rideSection").style.display = "none";
    document.getElementById("paymentSection").style.display = "block";

    document.getElementById("fareText").innerText = "Fare: ₹" + data.fare;
});

/* 💳 PAYMENT */
function pay(){
    let amount = document.getElementById("amount").value;
    socket.emit("make_payment", {amount});
}

/* ✅ PAYMENT SUCCESS */
socket.on("payment_success", () => {
    document.getElementById("msg").innerText = "Payment Successful!";
    document.getElementById("newRideBtn").style.display = "block";
});

/* ❌ PAYMENT FAILED */
socket.on("payment_failed", () => {
    document.getElementById("msg").innerText = "Wrong amount!";
});

/* 🔁 RESET APP */
function resetApp() {
    // Show booking again
    document.getElementById("paymentSection").style.display = "none";
    document.getElementById("bookSection").style.display = "block";

    // Reset inputs
    document.getElementById("source").value = "";
    document.getElementById("dest").value = "";
    document.getElementById("amount").value = "";

    // Reset texts
    document.getElementById("status").innerText = "";
    document.getElementById("msg").innerText = "";

    // Hide button again
    document.getElementById("newRideBtn").style.display = "none";
}
</script>

</body>
</html>
